name: CD - Deploy to Hugging Face Spaces

on:
  push:
    branches: [main, master]
    paths:
      - '0315/app.py'
      - '0315/requirements.txt'
      - '0315/src/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hugging Face Spaces
    runs-on: ubuntu-latest
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r 0315/requirements.txt
      
      - name: Prepare deployment files
        run: |
          mkdir -p deploy
          cp 0315/app.py deploy/
          cp 0315/requirements.txt deploy/
          cp -r 0315/src deploy/
          
          # Create README for HF Space
          cat > deploy/README.md << 'EOF'
          ---
          title: Stock Predictor
          emoji: 📈
          colorFrom: blue
          colorTo: green
          sdk: gradio
          sdk_version: 4.0.0
          app_file: app.py
          pinned: false
          ---
          
          # Stock Predictor - MLOps FTI Demo
          
          This is a stock prediction demo using XGBoost with technical indicators.
          
          ## Features
          - RSI, MACD, Bollinger Bands analysis
          - Market context (SPY, QQQ, VIX)
          - XGBoost prediction model
          
          ## Tech Stack
          - Hopsworks (Feature Store & Model Registry)
          - Modal (Scheduled Inference)
          - Hugging Face Spaces (UI)
          EOF
      
      - name: Push to Hugging Face
        if: env.HF_TOKEN != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd deploy
          python -c "
          from huggingface_hub import HfApi
          api = HfApi()
          repo_id = '${{ secrets.HF_USERNAME }}/stock-predictor'
          # Create repo if not exists
          api.create_repo(repo_id=repo_id, repo_type='space', space_sdk='gradio', exist_ok=True)
          # Upload files
          api.upload_folder(
              folder_path='.',
              repo_id=repo_id,
              repo_type='space',
              commit_message='Deploy from GitHub Actions'
          )
          "

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✅ Deployment successful!"
            echo "App should be available at: https://${{ secrets.HF_USERNAME }}.hf.space/stock-predictor"
          else
            echo "⚠️ Deployment skipped or failed"
            echo "This might be due to missing HF_TOKEN or HF_USERNAME secrets"
          fi
