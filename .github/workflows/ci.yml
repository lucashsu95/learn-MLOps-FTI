name: CI

on:
  push:
    branches: [main, master]
    paths:
      - '0315/**'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - '0315/**'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "0315"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '0315/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy black
          pip install -r requirements.txt
      
      - name: Run Ruff (Linter)
        run: |
          ruff check . --output-format=github || true
      
      - name: Run Black (Format Check)
        run: |
          black --check . || true
      
      - name: Run MyPy (Type Check)
        run: |
          mypy src/ --ignore-missing-imports || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: "0315"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          cache-dependency-path: '0315/requirements.txt'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          pip install -r requirements.txt
      
      - name: Run Unit Tests
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=term-missing
        env:
          HOPSWORKS_PROJECT: test_project
          HOPSWORKS_API_KEY: test_api_key
      
      - name: Upload Coverage Report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: 0315/coverage.xml
          fail_ci_if_error: false

  smoke-test:
    name: Smoke Test - Module Imports
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: "0315"
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Test Module Imports
        run: |
          python -c "
          from src.features import calculate_technical_indicators
          from src.config import get_config, FEATURE_COLS
          from src.constants import MARKET_TICKERS, RSI_PERIOD
          from src.utils import add_trading_days
          print('All module imports successful!')
          "
        env:
          HOPSWORKS_PROJECT: test_project
          HOPSWORKS_API_KEY: test_api_key
      
      - name: Test Feature Calculation
        run: |
          python -c "
          import pandas as pd
          import numpy as np
          from src.features import calculate_technical_indicators
          
          # Minimal test
          np.random.seed(42)
          n = 100
          prices = 150 * np.exp(np.cumsum(np.random.randn(n) * 0.02))
          df = pd.DataFrame({
              'open': prices, 'high': prices * 1.01,
              'low': prices * 0.99, 'close': prices,
              'volume': [1000000] * n
          })
          df = calculate_technical_indicators(df)
          assert 'rsi_14' in df.columns
          assert 'macd' in df.columns
          print('Feature calculation smoke test passed!')
          "
